      target_offset_mm: [0.0, 0.0, 0.0]
      descent_offset_mm: [0.0, 0.0, -5.0]
      min_descent_mm: 0.0
      descent_steps: 1
      descent_lock_xy: true
    flat_sheet_center:
      approach_mm: 75.0
      target_offset_mm: [0.0, 0.0, 0.0]
      descent_offset_mm: [0.0, 0.0, -22.0]
      min_descent_mm: 18.0
      descent_steps: 1
      descent_lock_xy: true
    cylindrical_midbody:
      approach_mm: 90.0
      target_offset_mm: [0.0, 0.0, 0.0]
      descent_offset_mm: [0.0, 0.0, -20.0]
