# Trash Robot V3 sorting grasp parameters.
# Units in this file are millimeters unless a key ends with _sec.

drop_points_mm:
  GARBAGE_RECYCLE: [-132.184982, -22.72745138, -72.59739985]
  GARBAGE_OTHER: [-113.4961574, 71.38376377, -51.76432275]
  GARBAGE_HAZARD: [-130.3127525, -109.648523, -80.14200628]
  GARBAGE_KITCHEN: [-103.6078482, 154.0349785, -59.9595406]

label_aliases:
  recycle: GARBAGE_RECYCLE
  other: GARBAGE_OTHER
  hazard: GARBAGE_HAZARD
  kitchen: GARBAGE_KITCHEN
  可回收: GARBAGE_RECYCLE
  其他: GARBAGE_OTHER
  有害: GARBAGE_HAZARD
  厨余: GARBAGE_KITCHEN

init_pose_mm: [118.1718722, -0.725102626, 32.39033932]
safe_drop_pose_mm: [180.0, 0.0, -50.0]

approach_mm: 60.0
lift_mm: 80.0
drop_safe_z_mm: 12.0

# The vision target is an estimated visible surface/semantic grasp point, not
# the final gripper contact pose. Ground trash needs a real downward contact
# stroke after the hover pose, otherwise the gripper closes above the object.
grasp_descent_offset_mm: [0.0, 0.0, -8.0]
grasp_descent_steps: 1
descent_lock_xy: true
min_grasp_descent_mm: 20.0

# Per-object grasp profiles. The VLM raw object name is matched against
# by_raw_keyword first, then by_label, then default/global values above.
# Keep XY locked during descent. RoArm's low-Z IK can drift in +X if a deep
# diagonal motion is requested, so every pickup approach is hover -> Z-only
# contact -> close.
grasp_profiles:
  default:
    approach_mm: 85.0
    target_offset_mm: [0.0, 0.0, 0.0]
    descent_offset_mm: [0.0, 0.0, -25.0]
    min_descent_mm: 20.0
    descent_steps: 1
    descent_lock_xy: true
  by_label:
    GARBAGE_RECYCLE:
      approach_mm: 85.0
      target_offset_mm: [0.0, 0.0, 0.0]
      descent_offset_mm: [0.0, 0.0, -5.0]
      min_descent_mm: 0.0
      descent_steps: 1
      descent_lock_xy: true
    GARBAGE_KITCHEN:
      approach_mm: 85.0
      target_offset_mm: [0.0, 0.0, 0.0]
      descent_offset_mm: [0.0, 0.0, -32.0]
      min_descent_mm: 25.0
      descent_steps: 1
      descent_lock_xy: true
    GARBAGE_HAZARD:
      approach_mm: 90.0
      target_offset_mm: [0.0, 0.0, 0.0]
      descent_offset_mm: [0.0, 0.0, -18.0]
      min_descent_mm: 12.0
      descent_steps: 1
      descent_lock_xy: true
    GARBAGE_OTHER:
