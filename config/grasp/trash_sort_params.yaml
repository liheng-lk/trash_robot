    compact_top_pinch:
      approach_mm: 80.0
      target_offset_mm: [0.0, 0.0, 0.0]
      descent_offset_mm: [0.0, 0.0, -24.0]
      min_descent_mm: 18.0
      descent_steps: 1
      descent_lock_xy: true
  by_raw_keyword:
    paper:
      approach_mm: 80.0
      target_offset_mm: [0.0, 0.0, 0.0]
      descent_offset_mm: [0.0, 0.0, -5.0]
      min_descent_mm: 0.0
      descent_steps: 1
      descent_lock_xy: true
    tissue:
      approach_mm: 80.0
      target_offset_mm: [0.0, 0.0, 0.0]
      descent_offset_mm: [0.0, 0.0, -5.0]
      min_descent_mm: 0.0
      descent_steps: 1
      descent_lock_xy: true
    battery:
      approach_mm: 90.0
      target_offset_mm: [0.0, 0.0, 0.0]
      descent_offset_mm: [0.0, 0.0, -16.0]
      min_descent_mm: 10.0
      descent_steps: 1
      descent_lock_xy: true
    alkaline:
      approach_mm: 90.0
      target_offset_mm: [0.0, 0.0, 0.0]
      descent_offset_mm: [0.0, 0.0, -16.0]
      min_descent_mm: 10.0
      descent_steps: 1
      descent_lock_xy: true
    cell:
      approach_mm: 90.0
      target_offset_mm: [0.0, 0.0, 0.0]
      descent_offset_mm: [0.0, 0.0, -16.0]
      min_descent_mm: 10.0
      descent_steps: 1
      descent_lock_xy: true
    banana:
      approach_mm: 85.0
      target_offset_mm: [0.0, 0.0, 0.0]
      descent_offset_mm: [0.0, 0.0, -32.0]
      min_descent_mm: 25.0
      descent_steps: 1
      descent_lock_xy: true
    peel:
      approach_mm: 85.0
      target_offset_mm: [0.0, 0.0, 0.0]
      descent_offset_mm: [0.0, 0.0, -32.0]
      min_descent_mm: 25.0
      descent_steps: 1
      descent_lock_xy: true
    bottle:
      approach_mm: 90.0
      target_offset_mm: [0.0, 0.0, 0.0]
      descent_offset_mm: [0.0, 0.0, -20.0]
      min_descent_mm: 14.0
      descent_steps: 1
      descent_lock_xy: true
    can:
      approach_mm: 90.0
      target_offset_mm: [0.0, 0.0, 0.0]
      descent_offset_mm: [0.0, 0.0, -20.0]
      min_descent_mm: 14.0
      descent_steps: 1
      descent_lock_xy: true

target_stability:
  enabled: false
  # 单次抓取优先可执行：使用第一个有效相机坐标，不再等待两个稳定样本。
  window_sec: 3.0
  min_samples: 1
  max_delta_mm: 80.0
  jump_reset_mm: 120.0

motion_feedback:
  enforce_pickup: true
  pickup_xy_tolerance_mm: 30.0
  pickup_z_tolerance_mm: 45.0

# RoArm MovePointCmd can report success while the low-front pickup pose lands
# forward/up from the commanded Cartesian point. This compensation is applied
# only to pickup descent stages (pre_grasp/grasp). Lift must keep the grasped
# XY position and only raise Z, so it does not receive pickup compensation.
# Feedback still compares the
# measured pose against the expected physical point, so a bad compensation fails
# closed before the gripper closes.
motion_command_compensation:
  pickup_enabled: false
  pickup_offset_mm: [0.0, 0.0, 0.0]

# Low contact poses near the floor are not equally reliable across the arm's
# front reach. A point can pass the coarse 2-link reach check while RoArm/MoveIt
# still drifts forward/up at execution time. This table is used as a diagnostic
# warning by default; the hard safety guard is motion_feedback, which checks
# /get_pose_cmd before closing the gripper.
contact_workspace:
  enabled: true
  reject_on_violation: false
  clamp_on_violation: false
  z_margin_mm: 8.0
  lowest_reliable_z_by_x_mm:
    - [240.0, -380.0]
    - [280.0, -350.0]
    - [310.0, -315.0]
    - [340.0, -300.0]
    - [380.0, -285.0]

ik_precheck:
  enabled: true
  reach_margin_mm: 5.0

# Pickup gate only applies to camera-front trash targets. Drop points may sit at
# the side/back and are validated by RoArm MoveIt / SDK, not by this pickup gate.
pickup_window_mm:
  x: [0.0, 800.0]
  y: [-300.0, 300.0]
  z: [-500.0, 250.0]

# Backward-compatible alias for older tooling; roarm_sort_grasper prefers
# pickup_window_mm.
grasp_window_mm:
  x: [0.0, 800.0]
  y: [-300.0, 300.0]
  z: [-500.0, 250.0]

gripper:
  open: 0.8
  close: 0.0
  repeat: 2
  repeat_interval_sec: 0.06
  hold_sec: 0.45

timing:
  target_max_age_sec: 999.0
  label_max_age_sec: 999.0
  max_camera_point_age_sec: 999.0
  max_arm_point_age_sec: 999.0
  max_grasp_plan_age_sec: 999.0
  cooldown_sec: 5.0
  move_service_timeout_sec: 2.0
  motion_timeout_sec: 18.0
  grasp_plan_max_age_sec: 999.0
  manual_trigger_wait_sec: 60.0
  manual_trigger_wait_interval_sec: 0.1
