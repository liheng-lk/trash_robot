amcl:
  ros__parameters:
    use_sim_time: false
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    base_frame_id: "base_link"
    global_frame_id: "map"
    odom_frame_id: "odom"
    scan_topic: /scan

    min_particles: 200
    max_particles: 800
    max_beams: 30

    laser_min_range: 0.05
    laser_max_range: 12.0
    laser_model_type: "likelihood_field"
    laser_likelihood_max_dist: 2.0

    z_hit: 0.5
    z_short: 0.05
    z_max: 0.05
    z_rand: 0.5
    sigma_hit: 0.2
    lambda_short: 0.1

    update_min_a: 0.05
    update_min_d: 0.05
    resample_interval: 1

    transform_tolerance: 1.0
    tf_broadcast: true
    set_initial_pose: false
    do_beamskip: false

map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: "OVERRIDDEN_BY_SCRIPT"
