amcl:
  ros__parameters:
    scan_topic: /scan
    update_min_d: 0.06
    update_min_a: 0.08
    max_beams: 80
    transform_tolerance: 0.25

local_costmap:
  local_costmap:
    ros__parameters:
      footprint: "[[0.30, 0.22], [0.30, -0.22], [-0.20, -0.22], [-0.20, 0.22]]"
      footprint_padding: 0.04
      width: 4
      height: 4
      always_send_full_costmap: false
      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan scan_depth

        scan:
          topic: /scan
          data_type: "LaserScan"
          clearing: true
          marking: true
          obstacle_max_range: 3.0
          raytrace_max_range: 3.5
          obstacle_min_range: 0.05
          raytrace_min_range: 0.05
          max_obstacle_height: 2.0

        scan_depth:
          topic: /scan_depth
          data_type: "LaserScan"
          clearing: true
          marking: true
          obstacle_max_range: 1.50
          raytrace_max_range: 1.80
          obstacle_min_range: 0.35
          raytrace_min_range: 0.20
          max_obstacle_height: 0.60

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.22
        cost_scaling_factor: 4.0

global_costmap:
  global_costmap:
    ros__parameters:
      footprint: "[[0.30, 0.22], [0.30, -0.22], [-0.20, -0.22], [-0.20, 0.22]]"
      footprint_padding: 0.04
      always_send_full_costmap: false
      plugins: ["static_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.35
        cost_scaling_factor: 2.5

controller_server:
  ros__parameters:
    controller_frequency: 12.0
    failure_tolerance: 0.5

    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]

    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      stateful: true
      xy_goal_tolerance: 0.12
      yaw_goal_tolerance: 1.20

    progress_checker:
      required_movement_radius: 0.03
      movement_time_allowance: 30.0

    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.16
      min_approach_linear_velocity: 0.04
      approach_velocity_scaling_dist: 0.45

      lookahead_dist: 0.35
      min_lookahead_dist: 0.20
      max_lookahead_dist: 0.55
      lookahead_time: 1.5
      use_velocity_scaled_lookahead_dist: true

      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 0.20

      use_regulated_linear_velocity_scaling: true
      regulated_linear_scaling_min_radius: 0.55
      regulated_linear_scaling_min_speed: 0.04

      use_cost_regulated_linear_velocity_scaling: true
      cost_scaling_dist: 0.12
      cost_scaling_gain: 1.0

      use_rotate_to_heading: false
      rotate_to_heading_angular_vel: 0.30
      rotate_to_heading_min_angle: 0.785

      allow_reversing: false
      transform_tolerance: 0.2

behavior_server:
  ros__parameters:
    simulate_ahead_time: 0.6
    max_rotational_vel: 0.40
    min_rotational_vel: 0.05
    rotational_acc_lim: 0.80
