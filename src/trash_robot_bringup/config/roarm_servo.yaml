###############################################
# RoArm-M2-S headless MoveIt Servo parameters
###############################################
use_gazebo: false

## Incoming keyboard commands are unitless values in [-1, 1].
command_in_type: "unitless"
scale:
  # Keep calibration jogging deliberately slow.
  linear: 0.08
  rotational: 0.4
  joint: 0.25

override_velocity_scaling_factor: 0.0

## Outgoing trajectory commands
publish_period: 0.034
low_latency_mode: false
command_out_type: trajectory_msgs/JointTrajectory
publish_joint_positions: true
publish_joint_velocities: true
publish_joint_accelerations: false
smoothing_filter_plugin_name: "online_signal_smoothing::ButterworthFilterPlugin"

## MoveIt planning scene
is_primary_planning_scene_monitor: false

## MoveIt group and frames
move_group_name: hand
planning_frame: base_link
ee_frame_name: hand_tcp
robot_link_command_frame: base_link

## Stop quickly when no keyboard input arrives.
incoming_command_timeout: 0.1
num_outgoing_halt_msgs_to_publish: 4

## Singularity / limits
lower_singularity_threshold: 17.0
hard_stop_singularity_threshold: 30.0
joint_limit_margin: 0.1
leaving_singularity_threshold_multiplier: 2.0

## Topic names. keyboardcontrol publishes to /servo_node/delta_*.
cartesian_command_in_topic: ~/delta_twist_cmds
joint_command_in_topic: ~/delta_joint_cmds
joint_topic: /joint_states
status_topic: ~/status
command_out_topic: /hand_controller/joint_trajectory

## Collision checking can be CPU-heavy on the RDK; keep self/scene checks on
## but at a low rate for manual calibration jogging.
check_collisions: true
collision_check_rate: 5.0
self_collision_proximity_threshold: 0.01
scene_collision_proximity_threshold: 0.02
